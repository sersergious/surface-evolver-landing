<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    App icon. Keep effects to what CoreGraphics' SVG renderer supports
    (make-icons.ts rasterizes with `sips`): shapes, linearGradient, clipPath —
    no <filter>. Shadow is faked with stacked translucent rounded rects.
    Artwork sits in the standard macOS margin (824px tile on a 1024 canvas).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#d7dce2"/>
    </linearGradient>
    <clipPath id="tile"><rect x="100" y="100" width="824" height="824" rx="185"/></clipPath>
  </defs>

  <!-- faked soft drop shadow -->
  <rect x="100" y="122" width="824" height="824" rx="185" fill="#000" opacity="0.07"/>
  <rect x="100" y="112" width="824" height="824" rx="185" fill="#000" opacity="0.09"/>
  <rect x="100" y="106" width="824" height="824" rx="185" fill="#000" opacity="0.11"/>

  <g clip-path="url(#tile)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>

    <!-- engineering grid, 8 divisions of the 824px tile -->
    <path fill="none" stroke="#c6ccd4" stroke-width="3"
          d="M203 100V924 M306 100V924 M409 100V924 M512 100V924 M615 100V924 M718 100V924 M821 100V924
             M100 203H924 M100 306H924 M100 409H924 M100 512H924 M100 615H924 M100 718H924 M100 821H924"/>

    <!-- triangulated surface band (the thing SE evolves) — a quiet backdrop
         crossing the middle, behind the monogram -->
    <g stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.35" stroke-linejoin="round">
      <polygon points="100,436 100,590 306,354"  fill="#5b8def" fill-opacity="0.20"/>
      <polygon points="100,590 306,520 306,354"  fill="#4a7dd6" fill-opacity="0.28"/>
      <polygon points="306,354 306,520 512,400"  fill="#6f9be8" fill-opacity="0.22"/>
      <polygon points="306,520 512,556 512,400"  fill="#4a7dd6" fill-opacity="0.17"/>
      <polygon points="512,400 512,556 718,330"  fill="#5b8def" fill-opacity="0.26"/>
      <polygon points="512,556 718,486 718,330"  fill="#6f9be8" fill-opacity="0.19"/>
      <polygon points="718,330 718,486 924,398"  fill="#4a7dd6" fill-opacity="0.24"/>
      <polygon points="718,486 924,548 924,398"  fill="#5b8def" fill-opacity="0.16"/>
    </g>
    <!-- mesh nodes at the band's vertices -->
    <g fill="#3d6bc4" fill-opacity="0.40">
      <circle cx="306" cy="354" r="9"/><circle cx="306" cy="520" r="9"/>
      <circle cx="512" cy="400" r="9"/><circle cx="512" cy="556" r="9"/>
      <circle cx="718" cy="330" r="9"/><circle cx="718" cy="486" r="9"/>
    </g>
  </g>

  <!-- monogram, optically centered in the tile -->
  <text x="512" y="668" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="430" letter-spacing="-20" fill="#2f3540">SE</text>
</svg>
